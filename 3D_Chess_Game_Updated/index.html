<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess Web Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #status {
            font-size: 18px;
            margin-bottom: 10px;
        }
        #instructions {
            font-size: 14px;
            color: #aaa;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
        .capture-box {
            margin-top: 10px;
            font-size: 14px;
            color: #ddd;
        }
        .captured-pieces {
            font-size: 24px;
            min-height: 30px;
            letter-spacing: 2px;
        }
        #game-over-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #game-over-text {
            font-size: 56px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 20px #4facfe;
            margin-bottom: 20px;
        }
        canvas {
            display: block;
        }
    </style>
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Include OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Include chess.js for logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <h1>3D Chess</h1>
        <div id="status">White to move</div>
        
        <div class="capture-box">
            <div>White Captured:</div>
            <div id="captured-white" class="captured-pieces" style="color: #000; text-shadow: 0 0 2px #fff;"></div>
        </div>
        
        <div class="capture-box">
            <div>Black Captured:</div>
            <div id="captured-black" class="captured-pieces" style="color: #fff; text-shadow: 0 0 2px #000;"></div>
        </div>

        <div id="instructions">
            - Left Click: Select / Move<br>
            - Right Click + Drag: Rotate Camera<br>
            - Scroll: Zoom In / Out
        </div>
    </div>
    
    <div id="game-over-overlay">
        <div id="game-over-text">Game Over</div>
        <button onclick="location.reload()" style="padding: 12px 24px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); color: white;">Play Again</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
